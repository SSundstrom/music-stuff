# fly.toml app configuration file for staging environment

app = 'spotify-tournament-staging'
primary_region = 'arn'

[build]

[deploy]
release_command = 'npx prisma migrate deploy'

[env]
BETTER_AUTH_URL = "https://spotify-tournament-staging.fly.dev"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '512mb'
cpus = 1
memory_mb = 512
